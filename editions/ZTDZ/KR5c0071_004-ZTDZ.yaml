  text: 道德眞經直解卷之四攺八
  hash: sha256:fc0b5b35f7d232e01dd90d73bffa8993fbe869995a61c08c02bd5364812b4ca2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0071_SJB_004-120254b, image: sjb/12/120254b.png}
body:
  text: 本來子邵若愚直解清河居士張知新校正含德之厚比於赤子毒虫不螫失亦切猛獸不據攫音钁鳥不搏骨弱筋柔而握固未知牝牡之合而䘒子壘切作精之至也終日號音毫而嗌不嗄一邁切和之至也知和曰常知常曰明益生曰祥心使氣曰强物壯則老是謂不道不道早已音以含抱也至德之厚深也者其行音杏可比於赤子赤子外無物情内無其心無心則物不爲對故毒虫不螫猛獸不據持也攫鳥不搏手擊也赤子骨弱筋柔任手而握物牢固未知牝牡陰陽也之配合而䘒赤子陰器作長也者至精之至也赤子終日號叫也而嗌咽也不嗄聲破也者至和之至也能知無心至精至和曰常知此常乃曰明不明常理百端滋益其生此曰凶祥兆也或用心使氣令體盛實此曰暫强乃是術法而非道也夫體盛氣强如物恃壯物壯則老是謂不道不是道宜當早已止也知者不言言者不知塞其兊閉其門挫其鋭解其紛和其光同其塵是謂玄同不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤故爲天下貴自悟自知者不可言若殢於言者則不知欲求不可言及之道者但塞其兊閉其門挫其心之鋭解其事之紛應事則和其光處世則同其塵常應常靜是謂玄同自然無憎無愛所以親疏自平利害自除貴賤自滅使萬物不可得而親不可得而疏不可得而利不可得而害不可得而貴不可得而賤諸縁俱息打斷情見蕩然自在獨超萬法故爲天下貴以正治國以奇音羈用兵以無事取天下吾何以知其然哉夫天下多忌諱而民彌貧人多利器國家滋昏人多伎巧奇音碁物滋起法令滋彰盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自朴其政悶悶其民淳淳其政察察其民缺缺禍兮福所倚福兮禍所伏孰知其極其無正耶正復爲奇音碁善復爲妖民之迷其日固已乆矣是以聖人方而不割廉而不劌直而不肆光而不耀正者一也王侯得一爲天下正故云以正治國吉凶悔咎生乎動惟一能克勝故云以奇一數也用兵孫子云口道是以無事取治也天下也老子曰吾何以知其然哉周時天下多誋諱人不敢言下情之病而民彌貧人多利便之器尚賢矜智國家滋昏人多伎巧無益盛行故奇異也物滋起法令滋彰失於德化民不知恥故盜賊多有故聖人云我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自朴是以無事治天下也雖其政悶悶不顯其治其民淳淳而自化若用有爲治世雖其政察察而顯其治其民缺缺而不完用有爲救世如湯療疥暫時爲福疥盛縁湯蓋禍兮因福之所倚其爲福兮乃禍之所伏孰知其極之理蓋治國者其無正耶今人正復反也爲奇邪也善復爲妖民人也之迷惑其日固已乆矣是以聖人大方而不分割清廉而不劌傷也處直而不申肆藏光而不炫燿者皆處於無事也治人事天莫若嗇音色夫惟嗇是以早復早復謂之重眞容切積德重積德則無不克無不克則莫知其極莫知其極可以有國有國之母可以長乆是謂深根固柢長生乆視之道用智識治人事天下則失其正莫若嗇有而不用曰嗇夫惟嗇是以早復正也早復謂之重積至德語云中庸之爲德也其至矣乎民鮮乆矣重積至德則事無不克勝也無不克而非苟且則莫知其極盡也莫知其極可以有國蓋正爲國之母有國之母可以長乆是謂深根固柢木根柢也乃長生乆視之道若言治身當抱其一一爲形之母是謂深根固柢乃長生住世留形乆視之道也但以一爲法則事無不克矣治大國若烹小鮮以道蒞天下者其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷人夫兩不相傷故德交歸焉治大國若如也烹小鮮魚也者謂不可擾也擾之則魚傷故以用也無爲之道蒞臨也天下者而民不傷至於其鬼人曰鬼不爲神祟疾疫傷人非只其鬼不爲神祟其神天曰神亦不爲虫蝗水旱傷人非其神鬼不傷人縁聖人用無爲之道亦不傷人夫人神幽顯兩不相傷者故無爲則與天地鬼神同德蓋德交合也歸焉是以無爲治天下者無天怨無人非無鬼責大國者下流天下之交天下之牝牝常以靜勝牡以靜爲下故大國以下小國則取小國小國以下大國則取大國故或下以取或下而取大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜爲下治大國者宜體天道下濟流行夫天下之交合也觀天下之牝牝柔靜也牝常以靜勝牡牡剛動也以靜爲謙下法故大國以用也謙下小國則取小國附之若小國以用也謙下大國則取大國納之故或用謙下以大取小或用謙下而小取大大國不過欲兼畜養也人是樂天者也小國不過欲入事人是畏天者也孟子曰樂天者保天下畏天者保其國兩者各得其所欲故居大者不可恃强宜爲下之也道者萬物之奥也善人之寳不善人之所保美言可以市尊行音杏可以加於人人之不善何棄之有故立天子置三公雖有拱璧以先駟馬不如坐進此道古之所以貴此道何也不曰音越求以得有罪以免耶故爲天下貴道者乃萬物之奥也善道人貴道之若寳不善道人恃德之所保身是故尊道爲美言從之可以如市以德爲尊行可以加於人夫人不善道德者又何棄之有也故如堯讓許由立爲天子楚置莊周爲三公招賢之聘雖有拱璧圭璧也玉爲之以先前也駟乘之馬公卿之車如此之榮不受而隱去是不如坐進此道也然古之所以貴此道者何事也所貴此道者何事也所貴者其心無欲視榮華如塵垢而不曰求其以得者有著境妄念之罪以免耶故爲天下貴爲無爲事無事味無味大小多少報怨以德聖人爲而無爲者是處事於無事也此恬惔之德其味無味應大與小言其形多與少言其數塵境妄縁能爲怨對者以無心爲事故云報怨以德圖難於其易爲大於其細天下之難事必作於易天下之大事必作於細故聖人終不爲大故能成其大夫人欲圖難者必先於其易欲爲大者必先於其細小也天下之難事必作爲也於易天下之大事必作爲也於細是故聖人而無所作終不爲大故能成其大夫輕諾必寡信多易必多難是以聖人由難之故終無難矣夫輕諾許從後必寡信縁於多易後必多難是以聖人應世而母必由難之故至終無難矣其安易持其未兆易謀其脆易泮其微易散爲之於未有治之於未亂合抱之木生於毫末九層之臺起於累土千里之行始於足下爲者敗之執者失之是以聖人無爲故無敗無執故無失故民之從事常於幾成而敗之愼終如始則無敗事矣是以聖人欲不欲不貴難得之貨學不學以復衆人之所過以輔萬物之自然而不敢爲其安易保持於危其未兆易謀於已成其冰脆薄則易泮冰散也蓋其微者易散也凡事爲之於未有之際治之於未亂之時夫合抱之木由生於毫末九層之臺起於累土千里之行始於足下事皆從微而至大不可不愼也凡有爲者故有敗之應有所執者故有失之是以聖人處事於無爲故無敗無執故無失是故民人也之從有爲之事者常於幾成而敗之幾者心動之微也心未動以前心處於無而不名幾動則顯露亦不名幾幾者心始離無入有在有之微乃欲之初事之始也若能愼事至終如事之始則無敗事矣是以聖人欲不欲者愼心動之微不貴難得之貨者愼事動之微故知聖人之學不用幾識爲學以復衆人之所過也以輔順也萬物之自然而不敢爲古之善爲道者非以明民將以愚之民之難治以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷式常知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順古之善爲道治天下者非不也以用也智見明民用智治世是將以愚民之也民之難治者以其智多故以智治國國之賊不以智治國國之福知此兩者亦楷模也式常知楷式是謂玄德玄德之理深矣遠矣謂與物事也反矣不以智識明民然後乃至大順天下俱順江海所以能爲百谷王者以其善下之也故能爲百谷王是以聖人欲上人以其言下之欲先人以其身後之是故聖人處上而人不重音仲處前而人不害所以天下樂推而不厭以其不爭故天下莫能與之爭江海所以能爲百谷王者以其善處下之也故能爲百谷王是以聖人欲在人上以其言卑下之欲在人先前也以其身後之是故聖人處上而人不重處前而人不害所以天下樂推而不厭者以其謙退不與物爭是故天下之人莫能與之爭天下皆謂我道大似不肖夫惟大故似不肖若肖乆其細也夫老子曰天下皆謂我道大者謂不拘形名度數故也有似者終不肖似也下同夫惟一氣之大故似然居於形名度數則終不肖古人云似則似只未是若肖則乆矣其細小也也夫夫助語也學人當子細若心有一毫一絲情識思念不盡由屬形名度數之内依舊生死輪迴故先聖有此垂誡我有三寳寳而持之一曰慈二曰儉三曰不敢爲天下先夫慈故能勇儉故能廣不敢爲天下先故能成器長音掌今捨其慈且勇捨其儉且廣捨其後且先死矣夫慈以戰則正以守則固天將救之以慈衛之善爲士者不武善戰者不怒善勝敵者不爭善用人者爲之下是謂不爭之德是謂用人之力是謂配天古之極用兵有言吾不敢爲主而爲客不敢進寸而退尺是謂行無行攘無臂仍無敵執無兵禍莫大於輕敵輕敵則幾喪吾寳故抗兵相加則哀者勝矣老子曰我有三德甚可爲寳貴重之意其寳執而持之可以治身可以治國一曰慈以仁愛物二曰儉以寡於欲三曰不敢爲天下先謙而不爭夫慈則敏惠故能勇於救物儉則常足故能廣不敢爲天下先故能成大器長今捨其慈且取也勇勇必害物捨其儉且取也廣廣則傷德捨其後且取也先先則人怨害物傷德人怨是死之道矣夫用兵慈愛不爭乃天之道也用慈以戰則爲正以守正則固如天將救之以慈衛護之古之善爲兵之士者而不用武善戰者以慈愛救物而不用怒善勝敵者不爭善用人者爲之謙下是謂不爭之德是謂用人之力二者是謂配合也天乃古之至極之德古之用兵有言曰吾不敢爲主主者興事而爲客客者應敵不敢進一寸而甘退一尺如是言之是無意於爭也是謂雖行應敵與無行同攘臂所以表怒今不怒與無臂同仍引也事者欲爭今不得已而應敵與無敵同執兵仗以表殺今以慈爲主與無兵同是以慈爲寳也老子曰禍莫大於輕敵易動也輕敵則幾喪失也吾寳故兩國抗舉也兵相加則慈哀於人者勝矣吾言甚易知甚易行天下莫能知莫能行言有宗事有君夫惟無知是以不吾知也知我者稀則我貴矣是以聖人被褐懷玉老子曰吾言簡直甚易知無所作爲甚易行天下之人以情識測度欲見欲聞欲爲欲得故莫能知莫能行此書言理有宗本論事有君主也意夫惟無不也知言之宗事之主老子曰是以不知吾也知我道者稀嘆曰則我道貴謂無上也矣是以聖人外被褐褐賤衣也而同塵内懷至道如玉如玉隱石惟見於外罕知其内矣知不知尚矣不知知病矣夫惟病病是以不病聖人之不病以其病病是以不病清靜經云内觀其心是知也心無其心是不知也能悟心無其心此爲尚矣道者心常無思無欲寂然不知心之所住若知者是病矣夫惟能病知爲病則不被所知爲障是以不病夫聖人之不病者以其病知爲病是以不病民不畏威則大威至矣無狹其所居無厭其所生夫惟不厭是以不厭是以聖人自知不自見自愛不自貴故去彼取此民人也心虚寂萬境自空所以不畏萬物之威則自知大威至矣誡之曰無執小識小行狹其所居無惡塵勞厭其所生夫惟不厭者藉有身爲利悟無相眞常故當自愛是以不厭也古人云五藴身全尚不知百骸散後何處覓是以聖人自知而不自見矜也自愛而不自貴誇也故去彼自見自貴取此自知自愛勇於敢則殺勇於不敢則活此兩者或利或害天之所惡孰知其故是以聖人由難之天之道不爭而善勝不言而善應不召而自來坦然而善謀天網恢恢疏而不失勇於敢爲則招殺害也勇於不敢則活利也此兩者或利或害如天之所惡者而孰誰也知其故理也感激之道是以聖人由難之天之道雖不爭而能善勝雖不言而能善應雖不召而報自來天道坦然而若善謀也使善惡不能逃如天布網雖恢恢寬大疏闊罰惡賞善而分毫不失民常不畏死奈何以死懼之若使民常畏死而爲奇音碁者吾得執而殺之孰敢常有司殺者殺而代司殺者殺是代大匠斲音卓夫代大匠斲希有不傷其手矣夫民貪欲爲奇是故常不畏死奈何感嘆之意立刑法以死使民懼之若使民忘欲而常自畏死其間而有爲奇者以謂吾得執而殺之以戒於衆孰敢也然以貪欲爲奇者必自招其禍常有司天也殺者殺又何必代天行刑不惟殘物傷生仍亦自失天和而代司殺者殺是譬如代大匠斲木匠也夫代大匠斲施斤斧之勞希有不傷其手矣專刑罰治世少有不失道矣民之飢以其上食税之多也是以飢民之難治以其上之有爲也是以難治人之輕死以其生生之厚也是以輕死惟無以生爲者是賢於貴生也周時民之飢不足之意者以其上食之廣必税之多也是以飢矣民之頑嚚而難治者以其上之有爲也是以難治矣人之冒險而輕死者以其上爲生生之厚也是以輕死矣惟上無以生爲過厚者是賢於貴天下之生也人之生也柔弱其死也堅强草木之生也柔脆其死也枯槁故堅强者死之徒也柔弱者生之徒也是以兵强則不勝木强則共故堅强居下柔弱處上人之生也其體柔弱及其死也其體堅强夫草木之生也柔脆其死也枯槁故見堅强者死之徒也柔弱者生之徒也是以兵强則不勝木强則人共伐故堅强則居下柔弱則處上天之道其由張弓乎高者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道則不然損不足以奉有餘孰能損有餘而奉不足於天下者其惟道乎是以聖人爲而不恃功成不居其不欲見賢耶天之道其由如也張施也弓乎高者抑損也之下者舉之有餘者損之不足者補之也夫天之道損有餘補不足而人道則不然損不足以奉有餘孰誰也能損有餘而奉不足於天下者其惟效天道乎是以聖人效天道爲而不恃功成不居者以其不欲見賢耶天下莫柔弱於水而攻堅强者莫之能先以其無以易之也柔之勝剛弱之勝强天下莫不知而莫之能行音衡是以聖人言受國之垢是謂社稷主受國之不祥是謂天下王正言若反天下莫過柔弱於水而攻堅强者莫之能先欲换易之以其無以易之也如柔之勝剛弱之勝强天下莫不知而莫之能行者蓋不能守柔受辱是以聖人言湯武之言萬方有罪在子一人能受國之垢是謂社稷主獨稱孤寡不穀者能受國之不祥是謂天下王此正言合德俗若反焉和大怨者必有餘怨安可以爲善是以聖人執左契而不責於人故有德司契無德司徹天道無親常與善人湯放桀武王伐紂而和天下之大怨者後必有征伐之餘怨旣有餘怨安可以爲善是以聖人處無爲之事如執左契左契自執右契與人契之左右合以爲信而不責求也於人有德者如司主也左契物來自合此天之道也無德者如司主也右契徹通也物求合此人之道也天道無親疎常與善行無爲之人小國寡民使民有什伯之器而不用也使民重死而不遠徙雖有舟輿無所乘之雖有甲兵無所陳之使民復結繩而用之甘其食美其服安其俗樂其業鄰國相望雞犬之聲相聞使民至老死不相與往來心本清靜元無染著縁心起欲而著萬物旣著萬物則生貪求老子欲使天下人心無欲不著萬物如是小國中寡民使民有什十人曰什夫之器伯百人曰伯夫之器智識可爲官長者而不用也且夫使民無欲則心靜安閑忘一切利益等事故重死而不遠徙移也無欲則無求雖有舟輿車也無所乘之無欲則無爭雖有甲兵無所陳之反朴還淳不假書契使民如三皇之世復結繩而用之無欲則不旋厚味而甘其食不事文采而美其服淳朴爲風安其俗各不相慕而樂其業雖鄰國相望雞犬之聲相聞彼此無欲無求雖相比之使民至老死不相與往來上怡怡然無所施下淳淳然無所爲如是則焉用什伯之器也信言不美美言不信信實之言其文不美於俗美言華瀚理不信實善者不辯辯者不善善道者在行不在辯說殢於辯者則不爲善論語云君子欲訥於言而敏於行知者不博博者不知知者明心識本不在多聞廣博務廣博者有所大不知孔子曰賜也汝以予爲多學而識之者與對曰然非與曰非也予一以貫之聖人無積旣以爲人己音紀下同愈有旣以與人己愈多子曰二三子以我爲隱乎吾無隱乎耳蓋聖人無積也欲人付囑護念旣以爲人因勢獲利己愈有旣以與人其道弘廣己愈多所以利他兼自利也天之道利而不害聖人之道爲而不爭老子書終二句以結其德天之道利而不害聖人之道爲而不爭道德眞經直解卷之四紀末元卿謁本來子時王屋鄧光求請此書欲鏤板於世本來子曰此書爲己以記遺忘今人聞道德之書多自退屈而恐難行光曰氣與形神若一而能把握陰陽故壽與天地敝而無有終時此謂之眞人若以一爲法而貫萬事則可游行天地之間視聽八遠之外此顯淳德而全道者謂之至人其次以陰陽爲法從八風之理而能處天地之和内無恚嗔之心故能適嗜慾於世亦可度百數此之謂聖人若取法則於天地象似日月辯列宿星辰爲之天文述歲運察陰陽逆從造律曆分别四時此謂之賢人其次徇五常百行謂之君子背君子之行謂之小人自眞人至君子不離一氣陰陽人事皆謂之德若對修德之士言一氣以前無爲大道雖三賢十聖尚猶生疑何況小人乎五常百行乃修人理之德尚不肯行加之大道當自退屈何畏憚耳本來子曰向有客言昔王雱注道德經少年而死父追雱魂見荷鐵枷云我不合注道德經故受此苦如是論之書必難行光曰詳雱所注雖不中道粗不失德設使人從其德亦可補於世焉譬如柳七作樂章集觀游詞廢句不過情境使人迷情逐境殢酒色爲奇障閉本心埋没道德至閨門聽之動其情發乎事鑚穴相窺踰墻相從汙失義方何異携人於溝壑任屯田之職作優倫之事爲儒不能駕先聖之道遺淫詞於世以翳愚俗之目此反先聖之道也且兩者罪孰重焉誑說之徒謗業自招而眞說難壞又何畏其嘲謔也本來子曰今時尚奇怪如河上公飛昇列子乘風點石爲金經歲不食臉紅髮黑如此之類使人覩相欽服某今貧居陋巷髮鬢蒼白貨藥於市畜妻養子與俗皆同若以書示人必招言謗光曰世言舜居歷山象耕鳥耘聖德感召也陸龜蒙曰斯異術也何聖歟孔子叙書於舜曰濬哲文明聖德止於是矣何感召之云云猶大成而後薦於天孟子曰堯舜與人同而好事者張其怪非聖意哉如漢文帝見河上公公乃如雲之昇去地百餘丈而與帝言苟能如是斯異術也此亦好事者張其怪焉列子能六和合一精明所以心凝形釋骨肉都融隨風東西如木葉幹殻竟不知風乘我耶我乘風耶此物我兩忘又豈果能躡空乘風歟夫乘風履空乃輕舉之術點石爲金乃變化之術經歲不食乃斷穀之術紅臉黑髮乃修養之術皆非道德道德之士者如列子居鄭亦有圃田之業子陽遺粟列子不受其妻拊心可見家貧亦有妻子也居鄭四十年國君大夫視之如衆庶此與鄙俗同也道德之士其同者事其不同者心俗人只取境論事爲識其心如莊子寓孔子見盜跖跖以世間人事論之故不免小人之毁也南華眞經云語道而非其序者非道也語道而非其道者宴取也今者先生前設道德階梯以顯其次序也不以術法注道者斯可取也直解此經文淺義深典實顯法世未曾有若言惟只爲己祖師如何利人請示要言告無他託本來子默坐乆而言曰五千餘言其要在無欲二字學人但心上無欲此是無上道然無欲二字其義極深故老子首篇先言無欲恐其學人執無再言有欲又恐殢有又言以有無兩者同謂之玄又恐執殢於玄故將又玄以拂跡此四法者乃入道之門今者學人往往各執一法而反爲病一者學人見說無欲便於心上斷念而求無欲不思斷除便是欲也此著無病二者將心求法將謂心外有法不知即心是法法即是心存意識在心便是欲也此著有病三者令心凝然依住如木人相似澄定不動此著於玄名亦有亦無病四者拂除玄跡作不依住解存能所之心此著又玄名非有非無病已上皆心有趣向並是汙染所以爲病人能心上無此四病方是無欲今學道人注書者尚自不能離言認玄爲道以又玄爲衆妙之門斯爲謬矣夫爲書當表顯之說其實離此四法方始見道道爲衆妙之門而書以言爲筌豈可執言生解學人但無纖毫繫念心如朗日常處空中無有纖埃光明遍照然後隨方應專如天起雲忽有還無不留蹤跡無所住心此名曰德謂無取無捨無凡無聖無一法可修無一行可得故云平常心是道又云一心不生萬法無咎學人到此多自生疑恐落於空遂望崖而退此非落空乃無心之心也了得無心唤作道人道人在眞人之上蓋眞人存意識爲學所以在道人之下時紹興庚辰人日潁川陳元卿記其言而綴于後

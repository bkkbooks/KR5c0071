body:
  text: 本來子邵若愚直解清河居士張知新校正載營魄抱一能無離乎專氣致柔能如嬰兒乎滌除玄覽能無疵在斯切乎愛民治國能無爲乎天門開闔能爲雌乎明白四達能無知乎生之畜之生而不有爲而不恃長而不宰是謂玄德心無定名隨處而立心動則著物著物便見心心動則屬陽其名曰神又名曰心心不動則屬陰其名曰精專一爲義又名曰性心向外也爲視爲聽其名曰魂又名曰情心向内也收視反聽其名曰魄又名曰意皆隨處立名總名曰心乃知心者載乘也身之主無不經營今言魄者謂魄屬陰陰以靜爲法制心於内靜則精魄住精魄住則神魂住陽爲陰所伏男爲女所制精神魂魄混融相合爲一謂之抱守也一抱一雖能追二氣於黄道會三性於元宫攢簇五行合和四象此長生之術未極於道者縁心著一故也老子嘆曰能無離乎離有入無令心廓徹清靜始曰無爲此名眞心乃大道也如專氣致柔和也者旣言專氣便是用心有心則不得致柔能比如嬰兒無心乎若滌除萬境一心覽執也玄如玉有疵能無心執玄而無瑕疵乎夫愛民治國之心經營天下之致事彰於跡有跡則有憂而能顯諸仁藏諸用而無爲乎天然機解之門心也開闔應務之際能隨順物情而爲雌乎心本靜明潔白四方通達縁染知見情解窒礙不得虚靜能無知見乎夫一者攀縁之本生滅之根旣有一繫著即非無爲之道能離抱一之跡方合於玄道也德玄德者生育之畜養之夫生之者道而不見其有爲之者德而不見其恃至於長成而不爲主宰是謂玄德故莊子云通於一萬事畢若無心得一而鬼神服此之謂也三十輻共一轂當其無有車之用埏始然切埴市只切以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用老子以車器室明物理有無利用藉有之以爲利便於無之中乃見妙有不窮之用且如車今之十八輻古之三十輻共輳一轂爲輪藉輪爲有形之利當其無中妙有在於運轉故知無者爲車之用也埏和也埴粘土也摶以爲器瓦缶甑之類藉器爲有形之利當其無中妙有在於盛貯乃知無者爲器之用也古之穴土爲居鑿户門謂之户而出入爲牖窗謂之牖以視外然後君臣父子宗廟寢廷之制以爲室藉室爲有形之利當其無中妙有於居處乃知無者爲室之用也故見有之以爲利便無之以爲妙用是以聖人藉幻身爲利以無心之心爲用使學人體物理有無而見道之利用五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂難得之貨令人行音杏妨是以聖人爲腹不爲目故去彼取此老子言五色令人目盲五音令人耳聾五味令人口爽失也盲聾口失皆殢聲色滋味之過迷失眞心不得見聞大道如馳騁田獵恣縱逸樂令人心發狂亂若貴難得之貨心染貪著令人妨行是以聖人爲腹者能容萬境不爲耳目之欲故去彼妄縁方能取此實見寵辱若驚貴大患若身何謂寵辱寵爲下得之若驚失之若驚是謂寵辱若驚何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患故貴以身爲天下若可寄天下愛以身爲天下若可託天下寵辱若驚貴爲大患縁若汝也身故也老子自問何謂寵辱寵得也辱失也因寒生熱因寵生辱故知寵爲下世人執著貴愛於身是故得之恐失故若如也驚失之悲悔故若如也驚是謂寵辱若驚老子自問何謂貴大患若身老子曰吾所以有大患者爲吾有受貴愛於身及吾無受貴愛於身如是則吾有何患故受貴以身爲天下者必招辱若可寄天下愛以身爲天下者必生患若可託天下視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰去吉切故混而爲一其上不皦古曉切其下不昧繩繩兮不可名復歸於無物是謂無狀之狀無物之象是謂恍惚迎之不見其首隨之不見其後執古之道以御今之有能知古始是謂道紀大道虚無無色故視之不見言其意夷遠故名曰夷大道無聲故聽之不聞言其意希闊故名曰希大道無形故搏之不得言其意微小故名曰微無色無聲無形此三者旣不可致詰細推也故從混未分曰混而爲一氣而言之其一在上運日月風雨而不皦見也其一在下厚載萬物而不昧繩繩兮者言一氣連運上下不絶之意能陰能陽能圓能方能青能黄妙用莫測故不可名復歸於無中之物乃人之一心便是混元一氣是謂無狀之中狀無物之中象物象意同二句叠言是謂恍無中似有曰恍惚有中似無曰惚恍惚者言有無不定之意故迎之不見其首前也隨之不見其後執操也萬古常存之道者以御侍也今之有一之名執一則能知古始初以一心進道釋氏以一心爲般若仗一心進取而能到彼岸是謂大道之紀綱古之善爲士者微妙玄通深不可識夫惟不可識故强爲之容豫兮若冬涉川猶似救切兮若畏四鄰儼若容涣若冰將釋敦兮其若朴曠兮其若谷渾兮其若濁孰能濁以靜之徐清孰能安以動之徐生保此道者不欲盈夫惟不盈故能敝不新成老子言古之善爲道之士者微妙玄通深理不可識夫惟深理不可識故且强爲之容而申猶豫之意豫兮若冬涉川徒行渡水曰涉衆流曰川言不得已而應事之意猶兮若畏四鄰言自性不出於外之意儼矜莊之貌若容言正容以悟之意涣冰散也若冰將釋言心如冰涣解釋之意敦立也兮其若木之朴也曠空也兮其性若谷也渾兮其若俗濁也孰誰也能於渾濁之間以見靜之徐清者若畏四鄰孰能於安靜之間以見動之徐生者若冬涉川保此微妙玄通之道者不欲持盈滿也夫惟不盈則常虚靜虚靜故能敝隱也不日新而成道矣致虚極守靜篤萬物並作吾以觀其復夫物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶知常容容乃公公乃王王乃天天乃道道乃乆没身不殆奉道者須是致虚極守靜篤夫萬物並皆也作生也自虚命也化神性也神化氣陰陽氣也氣化形形復化虚明見虚是根也故老子曰吾以觀其復夫物芸芸芸與云同自小及壯自壯及老而皆各歸其根學人欲識歸根法曰心靜靜謂内外俱息也又云靜曰復命者非靜中復有所見也但復去爲靜之心乃得其虚故曰虚靜則致極篤此理不可言宣便是當初大道命與我者故曰命此命離陰陽之外乃虚無大道也世言死生由命者此指陰陽命我有形體者處於陰陽故禍福壽夭推之可見也此命無生無死亘萬古而常存故曰常能知此常之理乃曰明不知常之理妄意作爲者凶近禍曰凶知此常者其心虚靜方能容攝萬境虚靜能容乃公正也公正乃王德也王以虚靜治國名曰無爲乃同於天天之虚靜乃同於道人同道之虚靜乃能長乆故没身不殆歸根復命常存之道無其止盡太上下知有之其次親之譽之其次畏之侮之故信不足焉有不信猶兮其貴言功成事遂百姓皆曰我自然大道廢有仁義智慧出有大僞六親不和有孝慈國家昏亂有忠臣絶聖棄智民利百倍絶仁棄義民復孝慈絶巧棄利盜賊無有此三者以爲音謂文不足故令有所屬音燭見素抱朴少私寡欲太上遠古也之世以無爲化天下下民但知有君之化而不見其跡其次至堯舜淳朴漸散以有爲之教欲復無爲之道縁顯仁義之迹民競親之因感聖智之治民歡譽之自此仁義易其性而失無爲之道莊子云自虞氏取仁義以亂天下也其次至三王德衰義薄用刑罰使民畏之以從仁義莊子云施及三王天下大駭其次至五霸大僞盛行巧役於下下侮之於上刑罰不足威懲孟子云五霸假也仁義者乃救世之法而以信爲本故因信不足焉而有不信太上之世爲無爲之事由兮其貴言功成事遂百姓皆曰我自然蓋不顯其治大道廢縁有顯也仁義之跡智慧旣出而有大僞生蓋智慧者心之妄念也意識分别不能一齊天下太上之世臣忠子孝以爲之常而六親不和者縁有顯也孝慈國家昏亂縁有顯也忠臣皆因矜智失於自然若絶聖棄智用無爲之化民獲利百倍矣若絶仁棄義不易其性民復孝慈若絶巧棄利不見其欲則盜賊無有聖智仁義巧利此三者以爲文華故治世有所不足老子故令有所屬使人見本來素性人能守之是名抱朴朴者道之一氣在人曰性乃人之一心取素潔爲義以此爲正世人因欲著境攀縁成私汙染素性何得見素但少私何謂少私寡欲是也一者乃眞心之動念而亦是私今老子不言無欲而言寡欲者治世之道以一爲正故也民持寡欲之道謂之德德育萬物謂之仁仁救安危謂之義義有去就謂之禮禮有變通謂之智智有誠實謂之信使民抱道則五常百行之所自出人心寡欲而無矯傚之能大哉老子令人從本而流末自然之教於天下也絶學無憂唯以水切之與阿相去幾何善之與惡相去何若人之所畏不可不畏荒兮其未央哉衆人熙熙如享太牢如登春臺我獨伯音抬兮其未兆若嬰兒之未孩乘乘兮若無所歸衆人皆有餘我獨若遺我愚人之心也哉純純兮俗人昭昭我獨若昏俗人察察我獨悶悶澹音演兮其若海飂音劉兮似無所止衆人皆有以我獨頑且鄙我獨異於人而貴求食于母一切憂苦皆因妄生老子使人絶妄心爲學故無憂患然捨妄還眞與棄眞逐妄譬如唯諾敬也之與阿聲之慢也出於一心相去幾何善之與惡出於一性相去何若人之所畏馳騁妄心不可不畏老子嘆人心荒荒兮其未央止也哉觀衆人心熙熙悦貌也然如享太牢之志太牢牛也祭天之物如登春臺之樂老子申絶學之意曰我獨怕靜也無爲也兮其未萌於兆若嬰兒之未孩乘乘兮者任運無心若無所歸衆人之心念念不停皆有餘老子曰我心獨若遺念也反釋曰我愚人之心也哉無智無得但純純兮眞心無雜俗人昭昭以爲明老子曰我獨若昏者而心無所恃俗人察察以爲智老子曰我獨悶悶然無意於物澹水動之貌兮其若海者言不可見其心飂高風之貌兮似無所止者如風行空無所依住衆人皆有以用也者著物生心老子曰我獨頑且鄙者不爲物遷老子曰我獨異於人者以心合虚而貴求食於母孔德之容惟道是從道之爲物惟恍惟惚惚兮恍其中有象恍兮惚其中有物窈兮冥兮其中有精其精甚眞其中有信自古及今其名不去以閲衆甫吾何以知衆甫之然哉以此老子言孔空也虛也德之容儀乃一氣也故云惟語助也道是從空德之容乃道化之爲物也其物惟爲也恍惟爲也惚恍者光而明故似有也惚者有而未形故似無是也細而言之惚兮恍似無似有其中有象恍兮惚似有似無其中有物物與象二字一意不指定言無中有也有中無也故疊言之恍惚便是物物便是恍惚前文云無狀之狀無物之象是謂恍惚恍惚便是混元一氣乃人心也心有所著故生恍惚心無所著便是窈冥老子先言有心之境次明無心之道窈兮幽之意冥兮暗之意其中有精者非謂窈冥之中又别有精只窈冥便是精張平叔云窈冥莫測是眞精其精之理甚眞爲義言其不僞也世俗以穢汁爲精者此術家之語也由陰陽相濟血氣變白如乳妳汁類也此物隨感所化而無定位在體爲汗在目爲淚在鼻爲涕在脾爲涎在腎爲精皆心之所感而爲即非眞精也又云其中有信者自古及今其名常存不去失也也可以用也閲度也衆物之甫始也老子曰吾何以知衆甫之然哉以此窈冥之道曲則全枉則直窪烏爪切則盈弊則新少則得多則惑是以聖人抱一爲天下式不自見故明不自是故彰不自伐故有功不自矜故長直良切夫惟不爭故天下莫能與之爭古之所謂曲則全者豈虛言哉誠全而歸之曲則全枉則直何謂曲全枉直夫處窪低下貌下則保盈能弊隱也其德則長新其爲道者務少則得多則惑是以聖人抱一爲天下式法也如不自見故明不自是故彰不自伐誇功曰伐故有功不自矜自誇曰矜故長雖涉迂曲而枉於直其由不爭也夫惟不爭故天下莫能與之爭老子引古爲證古之所謂曲則全者豈虚言哉誠全其身而德歸之希言自然故飄風不終朝驟雨不終日孰爲此者天地天地尚不能乆而況人乎夫道希止也言自然也不自然則事屬有爲故見飄風旋風也不終朝驟雨疾雨也不終日孰誰也爲此者天地也天地有作爲尚不能乆而況人乎故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之信不足有不信故從其事於道者奉道者心常虚靜故同於道從其事於德者惟其一心故同於德若專志仁義失於道德者同於凡俗之失夫事同於道者道亦得之事同於德者德亦得之如專志仁義而忘道德然同於失者賴五常百行外德修身故云失亦得之失道德者縁正信不足故也失尚稱德者由有不信仁義者愚俗跂音企者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長其在道也曰餘食贅之苪切行音杏物或惡之故有道者不處也跂謂脚跟不著地足者不能乆立跨騎也物者不能乆行是以自見者不明自是者不彰自伐者無功自矜者不長施心於事尚不能乆況乎其在道也即心見道見道離心有心則有礙喻如即食得飽飽當離食故曰餘食贅礙其行所行爲行物事也尚或惡之況乎其在道也故有道者不處也有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母吾不知其名字之曰道强爲之名曰大大曰逝逝曰遠遠曰返故道大天大地大王亦大域中有四大而王處一焉人法地地法天天法道道法自然大道虚無也虚無無物自然生有以一氣爲有物之稱天地萬類普因一氣而混成先在天地陰陽也以前生寂兮言無聲也寥兮言無形也獨立於萬物之上而不改易也周行六合而不殆止也萬物皆自一生可以爲天下母雖云有物寂兮寥兮亦是無稱之稱老子云吾不知其名以字記之曰道强爲之名曰大推大之理往逝之故曰逝往也逝四方上下其理彌遠故曰遠遠則不可推復返於一故曰返夫萬物因一而生故道大也萬物因陰陽化形故天大地大也又云王亦大者謂虚無爲域域中有此四大而王以道蒞天下而處一焉人以五常百行修身而從謙下由取法於地地之生育取法於天天之運化取法於一氣之道一氣之道取法於虚無自然重爲輕根靜爲躁君是以君子終日行不離輜重雖有榮觀燕處超然如何萬乘之主而以身輕天下輕則失臣躁則失君重爲輕之根靜爲躁動也之君主也以事言之是以君子終日行者欲輕亦不離輜重之車雖有榮觀在物必依燕處之靜超然可見輕不離重動不離靜君不離民如何感嘆之意萬乘之主而以身貴高而輕天下輕天下則失臣民也躁動也則失君善行音衡無轍跡善言無瑕謫善計不用籌筭善閉無關鍵而不可開善結無繩約而不可解是以聖人常善救人故無棄人常善救物故無棄物是謂襲明故善人不善人之師不善人善人之資不貴其師不愛其資雖智大迷是謂要妙善行其道者無轍跡車行之跡此所謂行無行行故無跡善言其道者無瑕謫此所謂言無言言故無瑕謫善計其道者其心無思無爲故不用籌筭善閉其道者心常無欲則境莫能入雖無關鍵鎖類而不可開善結繼也其道者達自心是道雖無繩繼約束而不可解是以聖人常以此善救人故無棄人常以此善普同救物故無棄物如是自利利他是謂襲明故善道人爲不善道人之師不善道人得善道人之所資然當不貴其師不愛其資若貴師愛資雖爲權智執之同於大迷無智無得是謂要妙知其雄守其雌爲天下谿音溪爲天下谿常德不離復歸於嬰兒知其白守其黑爲天下式爲天下式常德不忒復歸於無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸於朴學人未能全得無心之道者但知其雄强勝物而守其柔雌之道老子喻爲天下谿謂處下而不爭也能爲天下谿常使其德不離乆則復歸於嬰兒嬰兒謂覩境無心知其自理明白守其黑默之道者可爲天下式法也謂藏光隱德也能爲天下式常使其德不忒失也乆則其德復歸於無極盡也知其榮而不喜守其辱而不憂譬爲天下空谷謂虚而能容也能爲天下谷常保其德乃具足乆則復歸於朴朴散則爲器聖人用之則爲官長音掌故大制不割夫朴者大道化生一炁也散則爲陰陽器顯形謂之器之用四時之遷始春而後秋聖人觀生化之有序用之爲法宗廟則以昭穆焉朝廷則以尊卑焉鄉黨則以年齒焉推厚德則爲之官長是以先君後臣先夫後婦故體大道也之制使人倫有序而不傷割害也將欲取天下而爲之者吾見其不得已音以天下神器不可爲也爲者敗之執者失之故物或行或隨或噓或吹或强或羸或載或隳是以聖人去甚去奢去泰上古以無爲治天下無不治矣至堯舜時道德勢衰述仁義欲民從之救衰弊之世是將欲取治也天下而爲之者也老子曰吾見其不得已夫天下者神化之器用也而不可爲也爲者敗之執者失之故物事也或行或隨或前或後或嘘或吹或陰或陽或强或羸或盛或衰或載或隳或成或敗者縁執於爲是以聖人治天下所以去離也下同甚去奢去泰者由不執於爲也以道佐人主者不以兵强天下其事好音耗還音旋師之所處荆棘生焉大軍之後必有凶年故善者果而已音以下同矣不敢以取强焉果而勿矜果而勿伐果而勿驕果而不得已果而勿强物壯則老是謂非道非道早已以用也道佐輔人主者不以兵强取勝於天下夫舉兵加彼彼必應之其事旣好還報則勝負反復矣夫兵者凶器也師師衆也周官自五人爲伍積二千五百人爲師之所處民事廢而田不修故荆棘生焉大軍之後失於耕治必有飢歳凶年故善良之稱用兵者果定也下同而已矣不敢以取强焉果而勿自矜果而勿克伐果而勿生驕果而不得已而用之果而勿恃强夫物盛則衰至理必然物之用壯如兵之恃强物壯則老兵强則敗是謂非道非其道也宜當早已止也夫佳兵者不祥之器物或惡之故有道者不處是以君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬惔爲上故不美也若美必樂音落下同之樂之者是樂殺人也夫樂殺人者不可得志於天下矣吉事尚左凶事尚右是以偏將軍處左上將軍處右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之兵以濟難由如毒藥不可爲常夫佳美好也兵者不祥之器有好勝之心而妨道德萬物或惡之故有道者不處於佳兵是以君子居則貴左左爲陽陽主生用兵則貴右右爲陰陰主殺故知兵者不祥之器非君子之器禁暴救亂不得已而用之治國之道恬惔安靜之意爲上故兵不可美好也若美之者是必樂之樂之者是樂殺人也夫樂殺人者人不親之則不可得志於天下矣故吉事尚左凶事尚右是以偏副也將軍處左古之右爲尊左爲卑左主生上將軍處右右主殺言居上將之勢則以喪禮處之何謂也謂殺人衆多以悲哀泣之用戰勝取强則以喪禮處之也道德眞經直解卷之二

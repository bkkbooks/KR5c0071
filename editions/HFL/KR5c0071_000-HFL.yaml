body:
  text: 道德階梯圖道有二道德有三德一者虚無無爲之道二者一氣有爲之道故道有二道而分淺深一氣之道又謂之至德自至德已下皆屬有爲故爲三德以分内外此皆正道法門夫道德陰陽人事四者融通合爲一家若不能和會則觸途成滯學者宜審詳之宋紹興已卯歳清明日本來子述

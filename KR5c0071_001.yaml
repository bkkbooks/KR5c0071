front:
  text: 道德真經直解卷之一
  hash: sha256:2f12ad66fe67770c028dcb95783bf962feddf44af097b4135c141e10b4707e49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0071_HFL_001-001a, image: hfl/0372/0372-018.png}
body:
  text: 本來子邵若愚直解清河居士張知新校正道可道非常道名可名非常名無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼音呌此兩者同出而異名同謂之玄玄之又玄衆妙之門大道者至虛至靜無形無名不可以視聽求不可以思議知不可以語言及此無始無終常存不改之道自虛無始化一氣因有一氣之迹是故可道既云可道則非常存之道既有氣之名可名則非常存之名未現一氣已前無形無名之時此即天地之始此不可言之道緣有一氣之名為生萬物之母此可言之道乃知我身從一而有人能以一為法悟入而見大道夫大道者人之真心也一氣者心生之欲也夫真心本來虛靜元無生滅因真心動而為有其名曰欲念也智也幾也識也緣心起欲故隨欲受生既生之後受納好惡攀緣不息著五色殢五音恃強梁居寵辱迷妄為心因執妄心蓋覆一心不明一氣之道若人捨妄守欲便是一心此心持之則為正得之則為靈為萬物之母乃生死之根緣其存欲蓋覆真心所以有生有死人能無欲無欲則虛靜乃同無名之始便能出離死生故老子云常無欲以觀其天地之始此乃出離生死之妙又云常有欲以觀其一氣之道故為徼邊也淺之意也不可將心求心為有欲不可將心滅心為無欲此有無兩者同攝為一緣出言為教而分有無之異名有無混同謂之玄釋氏謂之不二法門又謂之中道玄之門以中為法設喻如筌然法從心起既起於心繫著在中則非虛靜老子恐中道法縛不能捨筌故將又玄以釋之學人但不著有無亦不居玄之中道實際理地不受一塵則心虛靜乃是無為故不須推照以無所得故始足無欲所以纖塵不立故名清靜都無作用故名無為無修無證故名自然都無一物故名虛靜自在無礙故名逍遙一味平常故名恬惔是故無欲則離諸分别離分别故無煩惱心無欲則觸事無我無我則無爭故無咎心無欲則離諸善惡離善惡故不拘因果心無欲則不著萬物不著萬物故無生無生故無死夫心常無欲者乃衆妙之門天下皆知美之為美斯惡已音以下同皆知善之為善斯不善已故有無之相生難易之相成長短之相形高下之相傾聲音之相和胡卧切前後之相隨是以聖人處無為之事行音衡不言之教萬物作而不辭生而不有為而不恃功成不居夫惟不居是以不去不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志強其骨常使民無知音智無欲使夫知音智者不敢為為無為則無不治矣天下皆知普遍共知為美之者己亦效之為美斯此也惡宜已止也皆知善之者己亦效為美斯不善宜已夫何故觀有無互换之相生難易事之相成長短理之相形此也高下勢之相傾聲音是非之相和前後瓞瓞之相隨世人因著美善事障本心逐境以為遂生八萬四千煩惱是以聖人處無心為之於事所以能齊萬物行之治世可不言之而教於天下且萬物事也並作起也而聖人不以言辭分别者恐民生好惡之情於己無所與於民無所取緣以無事安民故生民而不知有君之化雖為君父而不恃為主此顯諸仁也功業成而名不居此藏諸用也夫惟不居於迹是以德存而不去失也夫不尚賢能者恐人矜智王所好者謂之風民樂隨之謂之俗上矜賢智下必競趨不尚賢使民不爭其名故也名不爭其名故也食之與貨務資贍養豈貴珍奇難得貴乎難得民必深藏凡人之情與之則不授藏之必竊奪治世非不用貨不貴珍奇難得之貨者使民不為盜故也下民不見名利可欲使心不亂其民自治是以聖人之治不尚賢使民無智無智則自虛其心心虛則能容萬物故云實其腹不貴貨使民無欲無欲則自弱其志志弱則不隨境轉故云強其骨孔子嘆申棖之不剛者是也常使民無智則虛心無欲則忘境心境兩忘無所攀緣萬事俱息使夫有智者而不敢為緣聖人為無心之為則天下無不治矣道沖而用之或不盈淵兮似萬物之宗挫其鋭解其紛和其光同其塵湛兮似或存吾不知誰之子象帝之先虛無大道化生一氣一氣分而為陰陽陰陽生化稟一氣為主乃知一氣處陰陽之中故曰沖氣夫大道以沖中也氣而為用之也如天覆地載日照月臨冬寒夏暑春生秋斂皆沖氣之用沖氣者有而無形無而有精天地之間或不盈不虧淵深也兮似萬物之宗本也學人欲見沖氣者當挫其心之鋭鋭息則志休故能解其事之紛多也志間少欲則善和其光與物無爭則能同其塵內外無染湛兮其惟一心也雖不見其迹又似或存釋家喻為慧燈朗月術家以為大藥金丹孟子以謂浩然之氣言至大至剛以直養而無害塞乎天地之間其為氣也配義與道老子指湛兮似或存者乃大道所化之一氣曰吾不知誰之子此象萬物帝主也在陰陽之先前也天地不仁以萬物為芻楚俱切狗聖人不仁以百姓為芻狗天地任自然之道謂之至仁苟非至仁而有親疏焉春生非仁也秋殺非不仁也棄用因時以萬物為芻刈草也狗芻狗如今之草龍祭祀用之始以朱匣盛貯繡巾覆之既祭之後棄而不用也聖人以一心為德故以百姓心為心賞善非仁也罰惡非不仁也隨民任事賞罰因時故以百姓為芻狗之喻莊子云至仁無親大仁不仁夫惟不仁是謂大仁天地之間其猶橐籥乎虛而不屈動而愈出多言數音朔窮不如守中天地之間謂四方上下也其猶似也橐橐也籥笛也乎橐籥中虛其用在無而故不屈纍也橐以鼓風籥以運吹動而愈越也出若乾坤之開吐生物也闔閉藏物也老子欲多廣也言數頻也窮其理不如守中中者虛也以心處虛其用無盡谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不動谷以喻虛虛者道也神者道化之一氣乃無中之有也釋氏以虛神謂之實相取其不壞為義虛神無形本自無生而亦無死故云谷神不死虛乃生之本謂曰玄神為化之元謂曰牝谷神者是謂玄牝也萬物皆從玄牝之門出所出謂之門是謂生天陽也地陰也根以觀谷神綿綿綿綿者有中似無若存若存無中似有用之者以神合虛而不在勤勞措意功力能為也天長地久天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私耶故能成其私列子云凡有貌像聲色皆物也人見天長地久而不知虹霓雲霧風雨四時積氣成乎天山嶽河海金石草木積形成乎地夫有形者豈得不壞天地所以能長而且久者四時之運稟道為生化之主天地以其不自生故能長生是以聖人效之處謙下不敢自尊後其身而身反在人先前也以世利皆為身外之物緣外其身不為物纍而能身存得久夫聖人後其身外其身非以其無私耶效天地為而無為故能成善也其私上善若水水善利萬物而不爭處衆人之所惡烏路切故幾於道居善地心善淵與善仁言善信政善治事善能動善時夫惟不爭故無尤矣衆人好爭老子以不爭為上善喻若如也水謂水無心欲善利萬物而不爭是處衆人之所惡也以水之德故幾近也於道夫爭從心起無心則善於不爭以無心為法而能利於萬物是故居無心則善其地心無心則善其淵深也與無心則善其仁言無心則善其信政無心則善其治事無心則善其能動無心則善其時夫惟無心善於不爭故無尤遇也矣持而盈之不如其已音以揣初委切而鋭之不可長保金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道居高名厚利如持而盈滿之器常懷傾昃之憂不如其已上也則無大過之纍由不滿則易持也揣度也而鋭鋒鋭權勢也利之勢不可長保金玉滿堂莫之能守蓋因富貴而驕生驕慢則過起此非天殃自遺加也其咎禍也然何以免此患是以聖人觀四時之運如春生化功成名遂至夏則身退不居此天之道也道德真經直解卷之一

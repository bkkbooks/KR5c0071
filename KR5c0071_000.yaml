body:
  text: 道德階梯圖道有二道德有三德一者虛無無為之道二者一氣有為之道故道有二道而分淺深一氣之道又謂之至德自至德已下皆屬有為故為三德以分內外此皆正道法門夫道德陰陽人事四者融通合為一家若不能和會則觸途成滯學者宜審詳之宋紹興已卯歲清明日本來子述

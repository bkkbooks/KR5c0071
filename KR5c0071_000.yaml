front:
  text: 道德真經直解敘事改五據史記略曰老子為守藏室之史周衰遂去關令尹喜曰子將隱矣強為我著書上下篇言道德之意五千餘言而去莫知其終緣其史有上下篇目之文後人因之上卷説道下卷説德今以理考道德混説無上下篇此史辭之流言今以除去又不知何人不審正文前後本意分為八十一章惟務其華圖象陽數此以戲論無益於人今亦除去又創立篇名狹居其事言理不當今亦除去此書義不連環者當時關令不解徴問而老子自陳其事或引前聖之語所以文意斷續其辭重疊者如父母慈心訓之切切其間干涉國務者蓋老子嘆當時之風乃周朝之事也其間犯諱若改易之經久恐失本意據今云經史舊文則不避及書籍傳録為字不成此書箋注者多雖能於理則不中雖辨於事則無法只如注玄牝為口鼻是不中理也死之徒為涅槃梵語涅槃秦譯無為是不中事也如是胸懷臆注語言散失者不欲備舉其由未至於道也孔子志於道緣道無形據於有形之德以德為立基之本本立而道生以其漸者也豈可殢德而不進道此所謂過其門而不入其室也如志於六藝浮遊於德以術為道認穢汁為精以鈍濁為朴遲速為性拱手不動為無為不食滋味為恬惔儻來適去為自然休妻獨寢為清靜如此之徒不可與言至道如抱朴子第八卷云五千文雖出老子然皆泛論較略耳其中了不肯首尾全舉其事有何承按者也蓋其人多言房中及黃白術執有為為事將好利淫心測度無為之道是故不知首尾又況不及此子者乎又直以輕舉者為上士修道德者其次夫舉身隱形變化物象在禁為妖孔子不語怪力亂神以其無所益也老子所著長生久視務在進道而不專取且神仙之人居止三山不離於地跨鳳朝帝亦不離天居天地之間兀兀然壽千萬歲暫時易短為長報盡還復于死若不進道何異大椿耳此非論説是非恐殢神仙之術不進於道萬類惟人最貴最貴不譽食譽衣惟人能了達死生莫為塵緣放過忽爾死之將至此事不是臨期設或沉沒他途萬劫千生難遇愚得之不易歷學勤苦二十餘年始悟本來然而大道無言借有言以顯道故語言所以存意得意而忘言若以見聞覺知卒難了悟今居錢塘邂逅遇清河居士相與投機因論此經教中最上緣為注者辭博多文世人為文所障是故難知義趣道德本無多事若正注相挾直截易解令人一見開發聞言悟德即德見道以此不輟是為報祖而求正文凡得三本今以本朝御覽一本為準今所為注凡言德者事涉孔氏之門言其大道虛寂理準佛乘之旨以儒釋二教為證撮道德合為一家惟恐根鈍福薄不能承當其事此書下有留形住世長生之術中有保國安家久長之法上有出離生死常存之妙恐懼乎不見而患乎不行此身與古聖一般但為之若是當今聖主惟道惟德乃孝乃仁一慈二儉總循舊章功成平泰之風以此相合和氣使觀者不離仕國養親之德常存無欲之心久則民物淳淳致君堯舜之上以此流通上報國恩敘道德階梯科道者以無為顯實有為恃權即有明無悟無却智此理也德者體道為法而施於事此事也道德二字包含而無所不至所陳階梯次第緣道有淺深德分內外若不明階梯罔生互謗夫大道者寂然至虛無形無名而不可言其為書者無以記之故曰太易音亦不易也太易者未見氣也太易動則始見一氣之初故曰太初太極也太一也老子指一氣強名曰道孔子曰形而上者謂之道釋氏陳四諦亦曰道故知三者垂教總備於有也若不從有焉可以無明無以有明無故道有淺深爾太易者虛無也因動為有之初故曰太初有氣為形之始故曰太始氣形相合而生剛柔之質故曰太素氣形質具未相離之間名曰渾沌渾沌既分陰陽相蕩一氣居中萬物生焉故老子曰道生一一生二二生三三生萬物是故聖人仰觀俯察體天尊地卑用之則為官長而明王道立五常百行以正君臣父子夫婦之制以治人理夫大道者無名無迹無死無生萬劫常存而不變易尊高無上妙不可言夫上德者體無為為用以一為法而治天下萬物作而不辭生而不有為而不恃功成不居下知有之而不見賢萬物將自化所以無敗無失者蓋為無為則無不治矣若失之則執一而徇有為而為內德夫下德者體一為用以陰陽為法而治天下故孔子一以貫之善建者得一為正萬物將自賔若失一則徇五常百行於事而為外德夫內德者抱一也蓋一者國之母生之根抱一不離則根深柢固乃長生久視之道孔子謂之至德而以道為本也又名中庸者喜怒哀樂未發心在陰陽之中釋氏謂之中道玄門失之則殢陰陽潛運而為法術夫外德者從五常百行修於身孔子謂之敏德而以行為本也處柔弱不爭若水而攻堅強如慈儉若拙訥之類是也失之則殢智巧華薄騁強梁馳田獵而貴貨居寵辱矣夫道甚易知甚易行而人好徑故其出彌遠其知彌少大道平易而在不為而成以要言之皆歸無欲不欲以靜清靜為天下正老子不言藥不言仙不言白日升天者止言道德而非術也

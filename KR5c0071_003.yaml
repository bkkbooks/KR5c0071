front:
  text: 道德真經直解卷之三攺七
  hash: sha256:be757c3549490ca67b84c5bd9f41b6cd97e499fff28f77471b659d6122c6889b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0071_HFL_003-001a, image: hfl/0372/0372-076.png}
body:
  text: 本來子邵若愚直解清河居士張知新校正道常無名朴雖小天下莫能臣侯王若能守萬物將自賔天地相合以降甘露人莫之令音零而自均始制有名名亦既有夫亦將知止知止所以不殆大道虛無而常無名自元始化一氣一氣者有而未形名之曰朴其朴比大道雖小然為萬物母故天下莫能臣下也侯王若能守其朴萬物將自賔伏也以一治天下譬如天地之氣相合以降甘雨潤露普遍人莫之令而自均大道因朴始立制而有名名亦既有夫亦將知止若不止則散失其朴知止所以不殆而可長久譬道之在天下由川谷之與江海也知人者智自知者明勝人者有力自勝者强知足者富强行者有志不失其所止者久死而不亡者壽譬道之在天下由如也川谷之水皆與歸於江海也喻天下萬事總歸於道夫視其所以觀其所由察其所安知人者不過用智人皆以智為明不如反智於內而自知自知自理者是謂明勝人者不過有剛强謀略豐財鋭勢為力不如息力休心萬境不動而自勝自勝者是謂强世以財厚為富雖厚有盡但知自心本來具足用無窮盡者是謂富世間所學皆小志惟强行於道者謂之有志孔子志於道從事皆合於道是故不失其所止者乃能久形雖死而性不亡迷也失也處於不生滅之鄉萬劫常存者是謂壽大道泛兮其可左右萬物恃之以生而不辭功成不居衣被萬物而不為主故常無欲可名於小矣萬物歸焉而不知主可名於大矣是以聖人能成其大也以其不自大故能成其大執大象天下往往而不害安平泰大道泛兮言無定位也謂可大可小故其可左右何謂可小夫道萬物恃之以生而不辭謂如春功用備成至夏則春意不居當春之時萬物衣被而不為主宰故道常無欲於物則可名於小矣何謂可大夫萬物總歸於道焉而不知主可名於大矣是以聖人能成其大也而效其道為而不恃功成不居以其不自為大之跡故能成就其大執此大象以治天下無不歸往民往之者緣往而不害故也所以天下安平泰樂音嶽與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既世俗殢五音之樂與飲食之餌百年之間如待過客止道之出口淡乎其無味然而視之不足見聽之不足聞使之治國治家治身至於生之前死之後用之不可既盡也將欲歙音吸之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔之勝剛弱之勝强魚不可脫於淵國之利器不可以示人將欲歙斂也之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之陰根於陽此必然之理識事之理者是謂微明故知柔之勝剛弱之勝强也夫魚不可脫離也於淵水也如國之利器用也不可以示明也人若示人則如魚離水設符璽表信制斗稱令平此便國之利用將欲救弊必固轉生不淳蓋不察微明之義道常無為而無不為侯王若能守萬物將自化化而欲作吾將鎮以無名之朴無名之朴亦將不欲不欲以靜天下將自正治天下之道常處事於無為而天下無不為治也侯王若能守無為萬物將自化化而有欲作起也者吾將鎮安也以無名之朴無名之朴者亦將不欲是也不欲則以靜所以天下民心將自正上德不德是以有德下德不失德是以無德上德無為而無以為下德為之而有以為上仁為之而無以為上義為之而有以為上禮為之而莫之應則攘臂而仍之故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首也前識者道之華而愚之始也是以大丈夫處其厚不處其薄居其實不居其華故去彼取此太古之時上德不顯其德是以有德至伏羲之時造書契定婚姻之類因顯其德而為下德然雖不失德因有為德之跡是以無德夫上德者用無為之治而無以為事下德用有為之教而有以為事也至堯舜之時上以仁愛人利物曰仁人之德為之治化而無以為事其次至三王上生可否之義分别為之而是有以為也其次至五霸上體事之禮而為之治何期禮出詐生而民莫之應用禮立法欲人懼刑而從仁義如是則攘以手禦臂也臂而使民仍就也之故因失道而後用德失德而後用仁失仁而後用義失義而後用禮夫禮者救世之法而以信為本緣忠信之薄而為亂之首始也也如前代顯智識治世者乃道之華非道之實因徇其華而愚民之始也是以大丈夫處其忠信之厚不處其忠信之薄居其道之實不居其道之華故去彼華薄取此實厚昔之得一者天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下正其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以為正而貴高將恐蹶故貴以賤為本高以下為基是以侯王自稱孤寡不穀此其以賤為本耶非乎故致數譽無譽不欲琭琭如玉珞珞如石夫一者萬物之母也萬物皆自一生故得一則昌失一則亡老子言昔之得一者天得一以為也下同清而覆地得一以寧而載人之神得一以靈神顯用曰靈三才之間四方上下為谷得一以盈滿也萬物得一以生矣侯王理世得一為法以為天下正其各致之一也若天無失也下同一以清將恐拆裂地無一以寧將恐發泄水火風伏下神無一以靈將恐其神歇散也谷無一以盈將恐宇宙竭盡也萬物無一以生將恐生化滅侯王無一以為正而恃我之貴高失於恭謙將恐其位蹶失也故處於貴者以賤為本處於高者以下為基是以侯王自稱孤小失父曰孤寡女無夫曰寡不穀者以其就下此其以賤為本耶非乎將認我之貴高故致數不一也譽褒譽譽者毁之基不若無譽故不欲琭琭如玉之譽者不致珞珞如石之毁也反者道之動弱者道之用天下之物生於有有生於無馳心於外者不若反心於內故反者乃道之動動而反歸無心曰弱弱者乃道之用也世人只知天下之物生於有不知有本生於無故知無者道之用也上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道上士學也下同聞道能生實信勤而行之故云上士中士聞道胸中無主若存若亡故云中士下士聞道塵重業深聞說其心不依一法兀然無事具足道德必大笑之下士聞而不笑者必是奇怪矯妄有為法術此不足以為道故建言有之明道若昧夷道若類音耒進道若退上德若谷太白若辱廣德若不足建德若偷質真若渝大方無隅大器晚成大音希聲大象無形道隱無名故建立也言有之老子引先聖之語也明道若昧悟道無得故若昏昧夷平也道若類大道平夷無修無證故若類進道若退不用心智故若退上德若谷心如大虛能容萬境故若谷大白若辱無為而為故若辱廣德若不足大德之士圓修萬行故若不足建德若偷行行無跡故若偷質真若渝渝變也自心清靜隨物安委故若渝大方無隅淫房酒肆皆成道場故無隅大器晚成勤誠歷修方能究竟大音希聲至樂自聞已上十一句言大象無形由道隱無名之謂也夫惟道善貸音太且成道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以為和夫惟道善貸假借曰貸與陰陽生化而且成終復歸道自道生一氣一氣分而生二儀二儀生化以一氣為主以一合二故云三一氣在陰陽之中故名冲氣以三能生萬物故萬物無不負背也陰而抱向也陽皆仗冲氣以為和和者生之本人之所惡惟孤寡不穀而王公以為稱故物或損之而益益之而損人之所教我亦義教之强梁者不得其死吾將以為教父人之所惡惟孤寡不穀而王公以為稱者何也理世之道以謙下為法故物或損之者而受益益之者而見損故知謙者受益此古人之所教也老子曰我亦以謙為義而教之夫何故見恃强梁者不得盡其理而死老子曰吾將謙道以此為父教天下之至柔馳騁天下之至堅無有入於無間音澗是以知無為之有益也不言之教無為之益天下希及之矣天下之至柔者無心之心又玄是也人能馳騁至柔此天下之至堅而不壞者古頌云不見頭也無手世界壞時終不朽以無為有故曰無為入於不生滅之鄉萬劫長存更無間斷是以知無為之有益也此不可言及之教老子嘆曰無為之益天下希及之矣名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡知足不辱知止不殆可以長久高名與身二者孰親身與財貨二者孰多因名利而生得與亡失也孰病是故甚愛名者必因名大則費損也多藏貨者必因貨厚而亡失也居名知足則不辱居貨知止則不殆危也可以長久大成若缺其用不敝大盈若冲其用不窮大直若屈大巧若拙大辨若訥躁勝寒靜勝熱清靜為天下正大成者反若如也下同缺不完也故其用不敝敗也大盈滿也者反若冲虛也故其用不窮盡也大直者不申反若屈大巧者藏智反若拙大辨者不言反若訥是以缺能勝成虛能勝滿屈能勝直拙勝巧訥勝辨如躁勝寒陽動則躁靜勝熱陰止則靜此者如藥對病惟清靜無為能空萬境而絶對治乃為天下正天下有道却走馬以糞天下無道戎馬生於郊罪莫大於可欲禍莫大於不知足咎莫大於欲得故知足之足常足矣古之兵即農也農即兵也有事則征無事則耕天下有道民各安業却退也走馬戰士以糞田疇修治農事天下無亡也道兵戎之馬孳生於郊離王城三十里為近郊六十里為遠郊亡道之由罪莫大於縱心可欲禍莫大於貪心不知止足咎莫大於專心欲得夫罪禍咎皆因欲起若心無欲故能知足其心之足所遇而常足矣禍咎自除何罪之有不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不為而成夫道均化於萬物而知道在我矣欲見道者不須出户但推照一心其一與萬物一皆同故能知天下萬物也若更能棄推照之迹心無繫著則不須窺牖向外視也而見天之道也若向外求之於算數求之於陰陽求之於人事其出彌遠則其知彌少矣是以聖人不行而知萬物之性不見而名天之所造者而在不無也為而成為學日益為道日損損之又損以至無為無為而無不為矣故取天下者常以無事及其有事不足以取天下為學者日務滋益是也為道者日損萬緣是也夫為學務益者有二病一者讀誦抄寫持事多聞名著事二者尋於書義窮究文理名著理此皆心有所著故當損之夫為道務損者亦有二病一者斷除妄想心外求靜名執無二者併去塵緣專守一心名執有此皆心有所執宜又損之損去為學為道之心離著離執以至無為之道無為者是無心而為也無心非滅無也謂無切心名曰無心無心而為自然境空任其耳目而視聽自除從其貧富好醜自滅運水般柴役遊於世而無所纍故無為而無不為用矣故以道取治也天下者常以無事及其有事不足以取治也天下聖人無常心以百姓心為心善者吾善之不善者吾亦善之德善矣信者吾信之不信者吾亦信之德信矣聖人之在天下惵惵為音謂天下渾心百姓皆注其耳目聖人皆孩之聖人無欲無為無常處之心以百姓之心應事而為心繫辭云寂然不動感而遂通天下之故因事顯心而見其德善者吾善之有不善者聖人不分别吾亦善之因亦善之德化百姓善矣信者吾信之有不信者聖人不分别吾亦信之因亦信之德化百姓信矣是故聖人之在天下不疑於物則天下物自信不私於物則天下物自公不貴於珍天下自不貪不奢侈天下自從儉用其實天下自不僞崇其謙天下自不爭如此惵惵為天下渾心百姓皆注其德於耳目聖人處無心於事皆孩之也出生入死生之徒十有三死之徒十有三民之生動之死地亦十有三夫何故以其生生之厚蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地世人有心出於外體天地陰陽為法存想潄咽吐納般運之類而求長生者又有心入納也於內沉空殢靜昏懞如死者老子以十分為率而言之生之徒十分中有三分死之徒十分中有三分死之徒十分中有三分又有民釋曰衆生儒曰民衆萌之謂民之緣求養生動之死地亦十分中有三分老子自徵問夫民以衣食養生何故動之死地以其緣貪生生之過厚故也三三類九皆不取者緣生之徒心著有死之徒心著無民之生心著境三者心有所著皆居生死之地蓋聞善攝無生者離外境離二邊都無所著不立於心見如不見來如不來身心一如故陸行不遇兕虎入軍不被及也甲兵兕無所投其角兕如牛色青重千斤一角如鞭長三尺餘虎無所措其爪兵無所容其刃而使猛獸兵刃不能加害夫何故以其心無所著行住坐卧心常虛寂虛即無相寂即無生緣其無生故無死地道生之德畜之物形之勢成之是以萬物莫不尊道而貴德道之尊德之貴莫之爵而常自然故道生之畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂玄德萬物因道而生之因德而畜孕也之物之形賴生畜之勢而成之是以萬物莫不尊道而貴德也且道之尊德之貴其理莫之爵位也而常自然矣是故萬物皆自道生之畜之長之育之成之熟之養之覆之也然因道生之而不見其有因德畜之養之育之為而不恃乃至成之熟之長之而不為主宰此莫知爵而常自然矣是謂玄德天下有始以為天下母既得其母以知其子既知其子復守其母沒身不殆列子云夫有形者生於無形故天下有之始者無也以無為天下母既得其虛無為母以知其萬物皆子既知其子當復守其母人能以心合無如子歸母則沒身不殆塞其兊閉其門終身不勤開其兊濟其事終身不救見小曰明守柔曰强用其光復歸其明無遺身殃是謂襲常眼耳鼻舌身意謂之六入因六入而妄生諸緣而為禍之門也老子使人塞其兊兊為竅閉其六入之門是也貪癡既息則終身不勤勞也若開其兊濟其事納諸妄緣則終身不救夫六入以心為根但除其根則境自滅故老子曰見小曰明常無欲可名於小矣守柔曰强天下之至柔應物隨俗則用其光內心虛靜是復歸其明見小曰明明喻如燈頭光乃外照也誡之曰無遺其言失之則為身殃不遺其言是謂襲合也常道也使我介然有知音智行音衡於大道惟施是畏大道甚夷而民好音耗徑朝甚除田甚蕪倉甚虛服文采帶利劍厭飲食資財有餘是謂道誇非道也哉莊子曰道無問問無應故大道離言而不可以視聽求不可以思議知不可以語言及應有所施智行言於道者是可畏也故老子曰使我介作分畫也然有智行於大道惟施是畏實告之曰大道甚夷平也謂無為無事緣而民人也好徑務一時智識趣向有為又況當時朝廷矜智尚術甚除其道田甚荒蕪倉廪甚虛人競外華衣服文青與白謂之文采帶權勢若利劍厭飲食驕於味畜資財圖有餘是謂口道言誇道德理非道也哉觀其世道而施此言是以可畏善建者不拔善抱者不脫子孫以祭祀不輟修之身其德乃真修之家其德乃餘修之鄉其德乃長修之國其德乃豐修之天下其德乃普故以身觀身以家觀家以鄉觀鄉以國觀國以天下觀天下吾何以知天下之然哉以此善建立也德者用之不拔盡也善抱守也德者守之不脫失也如子孫相傳以祭祀不輟止也修之於身其德乃真修之於家一家皆修其德乃餘修之鄉一鄉皆修其德乃長修之國一國皆修其德乃豐修之天下天下皆修其德乃普故以修身之德觀身以修家之德觀家以修鄉之德觀鄉以修國之德觀國以修天下之德觀天下承承其德用之不盡若子孫祭祀相傳不止也老子曰吾何以知天下之然哉以此修身之德道德真經直解卷之三
